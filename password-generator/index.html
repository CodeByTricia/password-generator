<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Karla:wght@200..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <title>Password Generator</title>
</head>
<body>
  <div class="container">
    <h1 class="heading">Generate a <br><span>random password</span></h1>
    <p class="subheading">Never use insecure password again.</p>
    <button id="generate-pass">Generate passwords</button>
    <hr>
    <div class="password-box">
      <input type="text" id="password-one" readonly>
      <input type="text" id="password-two" readonly>
    </div>
    <p id="copy-message"></p>
  </div>
  <script src="index.js"></script>
</body>
</html>
